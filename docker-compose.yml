services:
  postgres:
    build:
      context: .
      dockerfile: 03-retrieval/postgres/Dockerfile
    container_name: medir-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-medir}
      POSTGRES_USER: ${POSTGRES_USER:-medir}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medir}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./03-retrieval/postgres/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
